<nav class="navbar" [class.scrolled]="scrolled()" role="navigation" aria-label="Main navigation">
  <div class="nav-container">
    <a href="#hero" class="nav-logo" aria-label="Home">
      <span class="logo-bracket">&lt;</span>
      <span class="logo-text">AS</span>
      <span class="logo-bracket">/&gt;</span>
    </a>

    <button
      class="mobile-toggle"
      (click)="menuOpen.set(!menuOpen())"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle navigation menu"
    >
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <!-- Backdrop overlay for mobile menu -->
    @if (menuOpen()) {
      <div
        class="nav-backdrop"
        (click)="menuOpen.set(false)"
        aria-hidden="true"
      ></div>
    }

    <ul
      class="nav-links"
      [class.active]="menuOpen()"
      role="menubar"
    >
      <!-- Close button inside mobile menu -->
      <li class="mobile-close-li">
        <button
          class="mobile-close-btn"
          (click)="menuOpen.set(false)"
          aria-label="Close navigation menu"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </li>
      @for (link of navLinks; track link.id) {
        <li role="none">
          <a
            [href]="'#' + link.id"
            (click)="menuOpen.set(false)"
            class="nav-link"
            role="menuitem"
          >{{ link.label }}</a>
        </li>
      }
      <li role="none">
        <button
          class="theme-btn clickable"
          (click)="theme.toggle()"
          [attr.aria-label]="'Switch theme (current: ' + theme.currentTheme() + ')'"
        >
          @switch (theme.currentTheme()) {
            @case ('dark') {
              <!-- Sun icon - clicking will go to light -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            }
            @case ('light') {
              <!-- Cyberpunk/bolt icon - clicking will go to cyberpunk -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
            }
            @case ('cyberpunk') {
              <!-- Fire icon - clicking will go to orange -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2c1 3 2.5 3.5 3.5 4.5A5 5 0 0 1 17 10c0 5-4 6-4 6s-4-1-4-6a5 5 0 0 1 1.5-3.5C11.5 5.5 11 5 12 2z"/>
                <path d="M10 16c-1.5-1.5-2-3-2-4.5C8 9 10 7 12 7s4 2 4 4.5c0 1.5-.5 3-2 4.5"/>
              </svg>
            }
            @case ('orange') {
              <!-- Moon icon - clicking will go to dark -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            }
          }
        </button>
      </li>
    </ul>
  </div>
</nav>
