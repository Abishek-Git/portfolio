<footer class="footer">
  <div class="footer-content">
    <div class="footer-social">
      @for (link of data.socialLinks; track link.name) {
        <a
          [href]="link.url"
          target="_blank"
          rel="noopener noreferrer"
          class="clickable"
        >{{ link.name }}</a>
      }
    </div>
    <p class="footer-text">
      Designed & Built by <span class="accent">{{ data.name }}</span>
    </p>
    <p class="footer-copyright">&copy; {{ year }} — All rights reserved</p>
  </div>
</footer>
