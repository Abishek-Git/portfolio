<section id="hero" class="hero">
  <div class="hero-layout">
    <div class="hero-content" appScrollReveal revealDirection="fade">
      <p class="hero-greeting">Hello, I'm</p>
      <h1 class="hero-name">{{ data.name }}</h1>
      <div class="hero-role">
        <span class="typing-text">{{ displayText() }}</span>
        <span class="cursor-blink">|</span>
      </div>
      <p class="hero-summary">{{ data.summary }}</p>
      <div class="hero-cta">
        <a href="#contact" class="btn btn-primary clickable">Get In Touch</a>
        <a href="#experience" class="btn btn-outline clickable">View My Work</a>
      </div>
    </div>
    <div class="hero-card" appScrollReveal revealDirection="right" [revealDelay]="300">
      <app-profile-card
        [avatarUrl]="'images/profile.jpg'"
        [name]="data.name"
        [title]="data.typingTexts[0]"
        [description]="'A Software Engineer who builds innovative solutions.'"
        [socialLinks]="data.socialLinks"
        [behindGlowColor]="'rgba(74, 158, 255, 0.4)'"
        [innerGradient]="'linear-gradient(145deg, #0a1628cc 0%, #1a3a5c88 50%, #4a9eff22 100%)'"
        (contactClick)="onContactClick()"
      />
    </div>
  </div>
  <div class="scroll-indicator" aria-hidden="true">
    <div class="mouse">
      <div class="wheel"></div>
    </div>
    <p>Scroll Down</p>
  </div>
</section>
