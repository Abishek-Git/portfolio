<section id="experience" class="section experience">
  <div class="container">
    <h2 class="section-title" appScrollReveal>
      <span class="section-number">03.</span> Experience
    </h2>
    <div class="timeline">
      @for (exp of data.experience; track exp.company; let i = $index) {
        <div
          class="timeline-item"
          appScrollReveal
          revealDirection="left"
          [revealDelay]="i * 200"
        >
          <div class="timeline-dot"></div>
          <div class="timeline-card">
            <div class="timeline-header">
              <h3>{{ exp.role }}</h3>
              <span class="company">{{ exp.company }}</span>
              <span class="period">{{ exp.period }}</span>
            </div>
            <ul class="timeline-highlights">
              @for (hl of exp.highlights; track hl) {
                <li>{{ hl }}</li>
              }
            </ul>
            <div class="timeline-tech">
              @for (tech of exp.technologies; track tech) {
                <span class="tech-tag">{{ tech }}</span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
